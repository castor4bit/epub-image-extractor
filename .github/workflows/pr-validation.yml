name: PR Validation

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

# Cancel old workflows for the same PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Stage 1: Quick validation on Ubuntu (5-7 minutes)
  quick-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

    - name: Setup Node.js
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Prettier format check
      run: pnpm format:check

    - name: Run ESLint
      run: pnpm lint

    - name: Run TypeScript check
      run: pnpm typecheck

    - name: Run unit tests
      run: pnpm test

    - name: Run integration tests
      run: pnpm test:integration

    - name: Build application
      run: pnpm build

    - name: Install Linux dependencies for E2E
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        sudo apt-get install -y \
          libasound2t64 \
          libgbm1 \
          libgtk-3-0 \
          libnss3 \
          libxss1 \
          libxtst6

    - name: Run E2E smoke tests
      run: xvfb-run -a -s "-screen 0 1280x1024x24 -ac -nolisten tcp -dpi 96 +extension GLX" pnpm test:e2e:smoke
      env:
        CI: true
        NODE_ENV: test
        E2E_TEST_MODE: true

  # Stage 2: Multi-platform E2E tests (parallel execution, 10-12 minutes)
  platform-e2e:
    needs: quick-validation
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false  # Continue testing other platforms even if one fails

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

    - name: Setup Node.js
      uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6.1.0
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build application
      run: pnpm build

    - name: Install Linux dependencies for E2E
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        sudo apt-get install -y \
          libasound2t64 \
          libgbm1 \
          libgtk-3-0 \
          libnss3 \
          libxss1 \
          libxtst6

    - name: Run E2E tests (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: xvfb-run -a -s "-screen 0 1280x1024x24 -ac -nolisten tcp -dpi 96 +extension GLX" pnpm test:e2e
      env:
        CI: true
        NODE_ENV: test
        E2E_TEST_MODE: true

    - name: Run E2E tests (Windows/macOS)
      if: matrix.os != 'ubuntu-latest'
      run: pnpm test:e2e
      env:
        CI: true
        NODE_ENV: test
        E2E_TEST_MODE: true

    - name: Upload test artifacts on failure
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
      if: failure()
      with:
        name: playwright-report-${{ matrix.os }}
        path: |
          playwright-report/
          test-results/
        retention-days: 7
